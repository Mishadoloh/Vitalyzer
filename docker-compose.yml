version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vitalyzer
      POSTGRES_PASSWORD: vitalyzer
      POSTGRES_DB: vitalyzer
    ports:
      - "5432:5432"
    volumes:
      - vitalyzer_pgdata:/var/lib/postgresql/data

volumes:
  vitalyzer_pgdata:
